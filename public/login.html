<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>MapleStore 로그인</title>
    <style>
      :root {
        --bg: #f5f7fb;
        --surface: #ffffff;
        --ink: #172033;
        --muted: #667085;
        --line: #dfe5ee;
        --line-strong: #c8d1df;
        --blue-ink: #2563eb;
        --red-ink: #b42318;
        --red-soft: #fff0ed;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100svh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: var(--bg);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      }

      .card {
        width: 100%;
        max-width: 340px;
        padding: 28px 24px;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: var(--surface);
        box-shadow: 0 8px 22px rgba(23, 32, 51, 0.06);
      }

      h1 {
        margin: 0 0 4px;
        font-size: 1.3rem;
      }

      p.sub {
        margin: 0 0 20px;
        color: var(--muted);
        font-size: 0.86rem;
        font-weight: 700;
      }

      label {
        display: block;
        margin-bottom: 12px;
        font-size: 0.82rem;
        font-weight: 800;
        color: var(--muted);
      }

      input {
        display: block;
        width: 100%;
        min-height: 46px;
        margin-top: 6px;
        padding: 10px 12px;
        border: 1px solid var(--line-strong);
        border-radius: 8px;
        font-size: 1rem;
        color: var(--ink);
        background: var(--bg);
      }

      button {
        width: 100%;
        min-height: 46px;
        margin-top: 6px;
        border: 0;
        border-radius: 8px;
        background: var(--blue-ink);
        color: #fff;
        font-size: 0.95rem;
        font-weight: 800;
        cursor: pointer;
      }

      .error {
        display: none;
        margin-bottom: 14px;
        padding: 10px 12px;
        border-radius: 8px;
        background: var(--red-soft);
        color: var(--red-ink);
        font-size: 0.86rem;
        font-weight: 700;
      }

      .error.show { display: block; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>MapleStore</h1>
      <p class="sub">둘만 쓰는 정산장입니다.</p>
      <div class="error" id="error">아이디 또는 비밀번호가 맞지 않습니다.</div>
      <form method="post" action="/api/login">
        <label>
          아이디
          <input type="text" name="id" autocomplete="username" required autofocus />
        </label>
        <label>
          비밀번호
          <input type="password" name="password" autocomplete="current-password" required />
        </label>
        <button type="submit">로그인</button>
      </form>
    </div>
    <script>
      if (new URLSearchParams(location.search).get('error')) {
        document.getElementById('error').classList.add('show')
      }
    </script>
  </body>
</html>
